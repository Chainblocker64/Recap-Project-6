name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:17
        env:
          POSTGRES_USER: learning_companion
          POSTGRES_PASSWORD: learning_companion
          POSTGRES_DB: learning_companion
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://learning_companion:learning_companion@localhost:5432/learning_companion
      OPENAI_API_KEY: sk-unused-in-ci
      DJANGO_SECRET_KEY: ci-secret-key
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run pytest

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: learning_companion
      POSTGRES_PASSWORD: learning_companion
      POSTGRES_DB: learning_companion
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learning_companion"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
